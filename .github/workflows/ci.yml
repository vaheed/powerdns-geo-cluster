name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck jq
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml ruff mypy
      - name: Shellcheck
        run: shellcheck scripts/*.sh docker/postgres/entrypoint.sh
      - name: Ruff
        run: ruff check bin monitoring
      - name: Mypy
        run: mypy monitoring/billing-api/main.py monitoring/billing-collector/collector.py
      - name: Repository validation
        run: ./scripts/cluster.sh validate
